<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#589632;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5277C3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ADD8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGradientDark)"/>

  <!-- Accent line -->
  <rect x="0" y="190" width="800" height="10" fill="url(#accentDark)"/>

  <!-- Globe/Map icon suggestion -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#589632" stroke-width="2" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="50" ry="20" fill="none" stroke="#589632" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="#589632" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="20" ry="50" fill="none" stroke="#589632" stroke-width="1.5" opacity="0.5"/>

  <!-- Name -->
  <text x="180" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#f1f5f9">Tim Sutton</text>

  <!-- Tagline -->
  <text x="180" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">Open Source GIS Developer</text>

  <!-- Sub-tagline -->
  <text x="180" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b">QGIS  •  NixOS  •  Kartoza</text>
</svg>
